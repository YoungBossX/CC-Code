name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Compile sources
        run: python -m compileall -q cc_code tests

      - name: Run packaging smoke tests
        run: python -m pytest tests/test_packaging.py -q

      - name: Run test suite
        run: python -m pytest -q

  package:
    name: Build & verify distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify tests are not packaged into the wheel
        run: |
          python - <<'PY'
          import glob, zipfile
          wheels = glob.glob("dist/*.whl")
          assert wheels, "no wheel produced by python -m build"
          names = zipfile.ZipFile(wheels[0]).namelist()
          leaked = [
              n for n in names
              if n.startswith(("tests/", "benchmarks/")) or "/tests/" in n
          ]
          assert not leaked, f"tests/benchmarks leaked into wheel: {leaked}"
          top = sorted({n.split("/", 1)[0] for n in names if not n.endswith("/")})
          print("wheel entries:", len(names), "| top-level:", top)
          PY
